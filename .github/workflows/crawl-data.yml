name: Crawl Launch Data

on:
  schedule:
    # Every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Crawl launch data
        run: npm run crawl

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-crawl: update launch data $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger deploy
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nextjs-deploy.yml',
              ref: 'master',
            });
